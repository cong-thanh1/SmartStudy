name: Infrastructure CI

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - infra/**
      - .github/workflows/infra-ci.yml
  push:
    branches:
      - develop
      - main
    paths:
      - infra/**
      - .github/workflows/infra-ci.yml

permissions:
  contents: read

jobs:
  validate:
    name: Build, test, synth
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run build

      - name: Test
        run: npm test

      - name: Synthesize CloudFormation
        run: npm run synth -- --quiet
